---
name: test
on: pull_request
jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: csm-actions/securefix-action/js@78d48e92c3c5812f4bac9a4f906b0f1b52dad655 # pr/208
        with:
          action: validate-config
          config_file: securefix-action.yaml
